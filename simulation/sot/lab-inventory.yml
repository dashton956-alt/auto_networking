# Local SoT inventory — used when SOT_BACKEND=local (ANIF-307).
# This file IS the source of truth for development: intent write-back
# (tags, custom fields) is persisted here by the platform.
site: lab-1

devices:
  - name: spine-1
    role: spine
    platform: frr
    primary_ip: 10.0.0.1
    tags: []
    custom_fields:
      intent_status: success
      last_intent_id: ""
      intent_applied_at: ""
    interfaces:
      - name: eth1
        ip_address: 10.1.1.0/31
        tags: []
      - name: eth2
        ip_address: 10.1.2.0/31
        tags: []
      - name: eth3
        ip_address: 10.1.3.0/31
        tags: []

  - name: spine-2
    role: spine
    platform: frr
    primary_ip: 10.0.0.2
    tags: []
    custom_fields: {}
    interfaces:
      - name: eth1
        ip_address: 10.2.1.0/31
        tags: []
      - name: eth2
        ip_address: 10.2.2.0/31
        tags: []
      - name: eth3
        ip_address: 10.2.3.0/31
        tags: []

  - name: leaf-1
    role: leaf
    platform: frr
    primary_ip: 10.0.0.11
    tags: []
    custom_fields:
      intent_status: success
      last_intent_id: ""
      intent_applied_at: ""
    interfaces:
      - name: eth1
        ip_address: 10.1.1.1/31
        tags: []
      - name: eth2
        ip_address: 10.2.1.1/31
        tags: []
      - name: eth10
        ip_address: 192.168.10.1/24
        tags: []

  - name: leaf-2
    role: leaf
    platform: frr
    primary_ip: 10.0.0.12
    tags: []
    custom_fields:
      intent_status: pending
      last_intent_id: ""
      intent_applied_at: ""
    interfaces:
      - name: eth1
        ip_address: 10.1.2.1/31
        tags: []
      - name: eth2
        ip_address: 10.2.2.1/31
        tags: []

  - name: leaf-3
    role: leaf
    platform: frr
    primary_ip: 10.0.0.13
    tags: []
    custom_fields:
      intent_status: failed
      last_intent_id: ""
      intent_applied_at: ""
    interfaces:
      - name: eth1
        ip_address: 10.1.3.1/31
        tags: []
      - name: eth2
        ip_address: 10.2.3.1/31
        tags: []

  - name: host-1
    role: host
    platform: linux
    primary_ip: 192.168.10.10
    tags: []
    custom_fields: {}
    interfaces:
      - name: eth0
        ip_address: 192.168.10.10/24
        tags: []

connections:
  - [spine-1, leaf-1]
  - [spine-1, leaf-2]
  - [spine-1, leaf-3]
  - [spine-2, leaf-1]
  - [spine-2, leaf-2]
  - [spine-2, leaf-3]
  - [leaf-1, host-1]

prefixes:
  - prefix: 192.168.10.0/24
    site: lab-1
    vrf: null
