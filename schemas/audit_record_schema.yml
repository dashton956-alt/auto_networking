# ANIF Audit Record Schema
# Version: 0.1.0
# Defines a single immutable audit record written by each pipeline stage.
#
# This schema is normative for US-07. Every pipeline stage MUST write at least
# one audit record upon completion (success or failure). Records are
# append-only: no update or delete operations are permitted under any
# circumstances, including rollback scenarios. Rollback stages write their own
# records; they do not modify earlier ones.
#
# All timestamps MUST be UTC. All UUIDs MUST be v4 (random).
# Storage backends MUST enforce append-only semantics at the storage layer,
# not solely at the application layer.

type: object
required:
  - record_id
  - intent_id
  - timestamp
  - stage
  - outcome
  - duration_ms

properties:
  record_id:
    type: string
    format: uuid
    description: >
      Globally unique identifier for this audit record (UUID v4).
      Generated by the stage at write time. Two records for the same
      intent and stage (e.g., a retry) MUST have different record_ids.

  intent_id:
    type: string
    format: uuid
    description: >
      The UUID of the intent that this audit record relates to.
      Ties this record to the originating POST /submit-intent request.
      All records for a single pipeline run share the same intent_id.

  timestamp:
    type: string
    format: date-time
    description: >
      ISO-8601 timestamp (RFC 3339) indicating when this record was written,
      in UTC. Example: "2026-04-07T14:23:01.456Z".
      Stages MUST write the timestamp at record-creation time, not at
      stage-start time, so the value reflects when the decision was
      committed to the audit log.

  stage:
    type: string
    enum:
      - validate
      - policy
      - risk
      - decision
      - governance
      - execute
      - rollback
    description: >
      The pipeline stage that produced this record. Stages execute in the
      order listed in this enum. A single pipeline run produces one record
      per stage reached; the rollback stage only appears when a compensating
      action was triggered.

  operator_id:
    type: string
    nullable: true
    description: >
      Identifier of the human operator or automation agent that triggered
      this stage. Set to null for system-initiated stages (e.g., automatic
      rollback, scheduled governance checks). When set, this value MUST
      match the authenticated principal from the originating API request
      so that records can be correlated with access logs.

  input_summary:
    type: object
    additionalProperties: true
    description: >
      A summary of the key inputs supplied to this stage. This is NOT the
      full request payload — it contains only the fields necessary to
      reconstruct what the stage received and why it made its decision.
      Implementations SHOULD redact sensitive fields (e.g., credentials,
      PII) before writing. Exact keys are stage-specific and defined in
      the pipeline implementation guide.

  output_summary:
    type: object
    additionalProperties: true
    description: >
      A summary of the key outputs produced by this stage. This is NOT the
      full response payload — it contains enough information to understand
      what decision was made and what the downstream stage received.
      Exact keys are stage-specific and defined in the pipeline
      implementation guide.

  outcome:
    type: string
    enum:
      - success
      - failure
      - escalated
      - blocked
    description: >
      The final outcome of this stage.
      success:   The stage completed its work without error and the pipeline
                 may continue to the next stage.
      failure:   The stage encountered an unrecoverable error, or the
                 attempted action failed validation or execution. The pipeline
                 halts and a rollback may be triggered.
      escalated: The stage determined that human review is required and
                 created a manual_review escalation. The pipeline is paused
                 until the escalation is resolved.
      blocked:   The stage explicitly blocked further pipeline progression
                 (e.g., a safety gate decision of "block"). No rollback is
                 triggered because no action was taken.

  reasoning_chain:
    type: array
    description: >
      Ordered list of reasoning steps taken by this stage, from first
      evaluation to final decision. Each step records what was evaluated,
      what conclusion was reached, and optionally why. The reasoning_chain
      enables operators to understand the logic path that led to the
      `outcome` and supports post-incident review and model auditing.
      Steps MUST be numbered 1-based and appear in execution order.
    items:
      type: object
      required:
        - step
        - description
        - decision
      properties:
        step:
          type: integer
          description: >
            Step number, 1-based. Steps MUST be consecutive and start at 1.
            If a stage branches (e.g., evaluates multiple rules), use
            sub-steps described in `description` rather than non-consecutive
            step numbers.

        description:
          type: string
          description: >
            A human-readable description of what was evaluated at this step.
            Should be specific enough to identify the input or condition
            that was examined. Example: "Checked intent.environment against
            prod threshold set".

        decision:
          type: string
          description: >
            The decision or conclusion reached at this step. Should be a
            concise, actionable statement. Example: "Applied prod thresholds
            (block >= 70)".

        rationale:
          type: string
          description: >
            Optional explanation of why this decision was reached, including
            any values compared or rules matched. Including rationale is
            strongly recommended for steps that result in escalated or blocked
            outcomes, as these require the most scrutiny during review.
            Example: "risk_score=72 >= prod block threshold of 70".

  duration_ms:
    type: integer
    minimum: 0
    description: >
      Wall-clock time in milliseconds from when this stage began processing
      to when it committed the audit record. Used for SLA monitoring and
      performance regression detection. MUST be >= 0. A value of 0 is valid
      only for synthetic or test records.
